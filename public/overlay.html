<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Tactics - Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    /* 全局鼠标穿透 */
    body { pointer-events: none; }

    /* 右侧贴边速查面板 */
    .overlay-panel {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 260px;
      max-height: 80vh;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(167, 139, 250, 0.2);
      border-top: 1px solid rgba(167, 139, 250, 0.15);
      border-bottom: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 16px 0 0 16px;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e4e4e7;
      pointer-events: auto;
      cursor: default;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .overlay-panel.has-scroll {
      overflow-y: auto;
      overflow-x: hidden;
    }

    .overlay-panel::-webkit-scrollbar { width: 4px; }
    .overlay-panel::-webkit-scrollbar-track { background: transparent; }
    .overlay-panel::-webkit-scrollbar-thumb { background: rgba(167, 139, 250, 0.25); border-radius: 2px; }

    /* 特工信息区 */
    .agent-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .agent-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(167, 139, 250, 0.25);
      object-fit: cover;
      background: rgba(167, 139, 250, 0.1);
      flex-shrink: 0;
    }

    .agent-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .agent-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .map-name { font-size: 12px; color: rgba(228, 228, 231, 0.6); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .map-name .map-en { color: rgba(228, 228, 231, 0.35); font-size: 11px; margin-left: 3px; }

    /* 技能标签 */
    .abilities-row {
      display: flex; flex-direction: column; gap: 2px;
      flex-shrink: 0; margin-bottom: 12px; padding-left: 46px;
    }

    .ability-tag {
      font-size: 12px; color: rgba(228, 228, 231, 0.5); line-height: 1.4;
    }

    .ability-tag .tag-key { color: rgba(228, 228, 231, 0.3); font-weight: 400; margin-right: 4px; }

    /* 分隔线 */
    .divider { height: 1px; background: rgba(167, 139, 250, 0.15); margin: 8px 0; flex-shrink: 0; }

    /* 收藏点位标题 */
    .fav-title {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
      color: rgba(228, 228, 231, 0.5);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px; flex-shrink: 0;
    }
    .fav-title .star { color: #facc15; font-size: 13px; }

    /* 点位列表 */
    .lineup-list { display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 0; }

    .lineup-item {
      padding: 8px 10px; border-radius: 8px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer; transition: all 0.15s ease;
    }

    .lineup-item:hover { background: rgba(255, 255, 255, 0.06); }
    .lineup-item.active { border-color: rgba(167, 139, 250, 0.5); background: rgba(167, 139, 250, 0.08); }

    .lineup-item-header {
      display: flex; align-items: center;
      justify-content: space-between; gap: 6px;
    }

    .lineup-item-title {
      font-size: 13px; font-weight: 600; color: #e4e4e7;
      line-height: 1.3; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .lineup-item-tags { display: flex; gap: 4px; flex-shrink: 0; }

    .lineup-tag {
      font-size: 10px; color: rgba(228, 228, 231, 0.35);
    }

    .lineup-tag.side-tag { margin-left: 4px; }
    .lineup-tag.ability-tag-sm { }

    .lineup-item-desc {
      font-size: 11px; color: rgba(228, 228, 231, 0.4);
      line-height: 1.3; margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 查看图片按钮 */
    .view-img-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; padding: 3px 8px;
      font-size: 11px; font-weight: 500;
      color: rgba(167, 139, 250, 0.7);
      background: rgba(167, 139, 250, 0.08);
      border: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 5px; cursor: pointer;
      transition: all 0.15s ease;
    }
    .view-img-btn:hover {
      color: rgba(167, 139, 250, 1);
      background: rgba(167, 139, 250, 0.15);
      border-color: rgba(167, 139, 250, 0.3);
    }

    /* 步骤列表 */
    .lineup-steps {
      margin-top: 6px; padding-top: 6px;
      border-top: 1px solid rgba(167, 139, 250, 0.1);
    }

    .step {
      font-size: 12px; color: rgba(228, 228, 231, 0.6);
      line-height: 1.5; padding-left: 14px;
      position: relative;
    }

    .step::before {
      content: attr(data-index);
      position: absolute; left: 0;
      color: rgba(167, 139, 250, 0.6);
      font-weight: 600; font-size: 11px;
    }

    /* 导航箭头 */
    .nav-arrows {
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      margin-top: 8px; flex-shrink: 0;
    }

    .nav-arrow {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid rgba(167, 139, 250, 0.2);
      background: rgba(167, 139, 250, 0.05);
      color: rgba(167, 139, 250, 0.6);
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease; line-height: 1;
    }

    .nav-arrow:hover {
      border-color: rgba(167, 139, 250, 0.4);
      background: rgba(167, 139, 250, 0.12);
      color: rgba(167, 139, 250, 0.9);
    }

    .nav-counter { font-size: 11px; color: rgba(228, 228, 231, 0.4); min-width: 30px; text-align: center; }

    /* 空状态 */
    .empty-state { text-align: center; padding: 16px 0; }
    .empty-icon { font-size: 24px; opacity: 0.3; margin-bottom: 6px; }
    .empty-text { font-size: 12px; color: rgba(228, 228, 231, 0.4); line-height: 1.5; }

    /* 底部关闭按钮 */
    .footer { margin-top: 10px; flex-shrink: 0; }

    .close-btn {
      display: block; width: 100%; padding: 6px 0;
      font-size: 11px; font-weight: 600;
      color: rgba(167, 139, 250, 0.5);
      border: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 8px; background: transparent;
      cursor: pointer; transition: all 0.15s ease;
      letter-spacing: 0.5px; text-align: center;
    }

    .close-btn:hover {
      color: rgba(167, 139, 250, 0.8);
      border-color: rgba(167, 139, 250, 0.35);
      background: rgba(167, 139, 250, 0.06);
    }

    /* placeholder */
    .placeholder { text-align: center; padding: 24px 16px; }
    .placeholder-icon { font-size: 28px; opacity: 0.3; margin-bottom: 8px; }
    .placeholder-text { font-size: 13px; color: rgba(228, 228, 231, 0.5); line-height: 1.5; }
    .placeholder-hint { font-size: 11px; color: rgba(228, 228, 231, 0.3); margin-top: 4px; }

    /* ============================================ */
    /*            中央图片展示 Lightbox            */
    /* ============================================ */
    .lightbox {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      pointer-events: auto;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .lightbox.visible { opacity: 1; }

    /* 内容容器 - 固定大小居中 */
    .lightbox-content {
      position: relative;
      width: 45vw;
      height: 40vh;
      min-width: 320px;
      min-height: 240px;
      max-width: 700px;
      max-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
    }

    .lightbox-close {
      position: absolute;
      top: 16px; right: 20px;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
    }

    .lightbox-nav:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .lightbox-nav.prev { left: 8px; }
    .lightbox-nav.next { right: 8px; }

    .lightbox-counter {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 12px;
      border-radius: 12px;
    }

    .lightbox-title {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 600;
      max-width: 60vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 点位坐标预览页 */
    .lineup-preview {
      width: 100%;
      height: 100%;
      position: relative;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 8px;
      overflow: hidden;
    }

    .lineup-preview .map-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: contain;
      opacity: 0.85;
      pointer-events: none;
    }

    /* 站位标记 */
    .coord-marker {
      position: absolute;
      width: 12px; height: 12px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 1;
    }

    .coord-marker.start {
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }

    .coord-marker.end {
      background: #a78bfa;
      box-shadow: 0 0 8px rgba(167, 139, 250, 0.6);
    }

    .coord-label {
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      margin-top: 4px;
      font-size: 11px;
      white-space: nowrap;
      padding: 1px 6px;
      border-radius: 4px;
      pointer-events: none;
    }

    .coord-marker.start .coord-label {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }

    .coord-marker.end .coord-label {
      background: rgba(167, 139, 250, 0.2);
      color: #a78bfa;
    }

    /* 连线 */
    .coord-line {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* 页面指示 */
    .lightbox-page-label {
      position: absolute;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.4);
      padding: 2px 10px;
      border-radius: 8px;
      pointer-events: none;
    }

    /* 右上角水印 */
    .watermark {
      position: fixed;
      top: 16px; right: 20px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px; font-weight: 600;
      color: rgba(167, 139, 250, 0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- 右上角水印 -->
  <div class="watermark">Valorant Tactics</div>

  <!-- 右侧面板 -->
  <div class="overlay-panel" id="panel">
    <div id="content"></div>
  </div>

  <!-- 中央图片展示 -->
  <div class="lightbox" id="lightbox" style="display:none;">
    <button class="lightbox-close" id="lbClose">&times;</button>
    <button class="lightbox-nav prev" id="lbPrev">&#9664;</button>
    <button class="lightbox-nav next" id="lbNext">&#9654;</button>
    <div class="lightbox-content" id="lbContent"></div>
    <div class="lightbox-title" id="lbTitle"></div>
    <div class="lightbox-counter" id="lbCounter"></div>
  </div>

  <script>
    /* =============================================
     *  Overlay 右侧速查卡 + 中央图片 Lightbox
     * ============================================= */



    var currentLineupIndex = 0;
    var lineupData = [];
    var overlayData = null;
    var pollTimer = null;

    // Lightbox state
    var lbPages = [];  // { type: 'coords', data: lineup } or { type: 'image', src: url }
    var lbIndex = 0;
    var lbTitle = '';

    function esc(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escAttr(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /* ---------- Lightbox ---------- */

    function openLightbox(lineup) {
      lbTitle = lineup.title || '';

      // 构建页面列表：第0页是坐标预览，后面是图片
      lbPages = [];

      // 第0页：坐标预览（如果有坐标）
      if (lineup.coordinates) {
        lbPages.push({ type: 'coords', data: lineup });
      }

      // 图片页
      var images = [];
      if (lineup.standImage) images.push(lineup.standImage);
      if (lineup.detailImages) images = images.concat(lineup.detailImages);
      images.forEach(function(url) {
        if (url) lbPages.push({ type: 'image', src: url });
      });

      if (lbPages.length === 0) return;
      lbIndex = 0;
      renderLightboxPage();
      var lb = document.getElementById('lightbox');
      lb.style.display = 'flex';
      // 触发 reflow 后添加 visible class（用于动画）
      requestAnimationFrame(function() { lb.classList.add('visible'); });
    }

    function closeLightbox() {
      var lb = document.getElementById('lightbox');
      lb.classList.remove('visible');
      setTimeout(function() { lb.style.display = 'none'; }, 200);
    }

    function navigateLightbox(dir) {
      lbIndex = (lbIndex + dir + lbPages.length) % lbPages.length;
      renderLightboxPage();
    }

    function renderLightboxPage() {
      var page = lbPages[lbIndex];
      var content = document.getElementById('lbContent');

      if (page.type === 'coords') {
        // 渲染坐标预览
        var coords = page.data.coordinates;
        var x1 = coords.start[0] * 100, y1 = coords.start[1] * 100;
        var x2 = coords.end[0] * 100, y2 = coords.end[1] * 100;
        var mapKey = (overlayData && overlayData.map && overlayData.map.key) || '';
        var mapSvg = mapKey ? '/maps/' + mapKey + '_map.svg' : '';

        var mapBgHtml = mapSvg
          ? '<img class="map-bg" src="' + escAttr(mapSvg) + '" alt="" onerror="this.style.display=\'none\'">'
          : '';

        content.innerHTML =
          '<div class="lineup-preview">' +
            mapBgHtml +
            '<svg class="coord-line" viewBox="0 0 100 100" preserveAspectRatio="none">' +
              '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="rgba(167,139,250,0.4)" stroke-width="0.4" stroke-dasharray="1,1"/>' +
            '</svg>' +
            '<div class="coord-marker start" style="left:' + x1 + '%;top:' + y1 + '%"><div class="coord-label">站位</div></div>' +
            '<div class="coord-marker end" style="left:' + x2 + '%;top:' + y2 + '%"><div class="coord-label">落点</div></div>' +
            '<div class="lightbox-page-label">坐标预览</div>' +
          '</div>';
      } else if (page.type === 'image') {
        content.innerHTML = '<img class="lightbox-img" src="' + escAttr(page.src) + '" alt="' + escAttr(lbTitle) + '">';
      }

      // 更新标题和计数器
      document.getElementById('lbTitle').textContent = lbTitle;
      var total = lbPages.length;
      if (total > 1) {
        document.getElementById('lbCounter').textContent = (lbIndex + 1) + ' / ' + total;
        document.getElementById('lbCounter').style.display = '';
        document.getElementById('lbPrev').style.display = '';
        document.getElementById('lbNext').style.display = '';
      } else {
        document.getElementById('lbCounter').style.display = 'none';
        document.getElementById('lbPrev').style.display = 'none';
        document.getElementById('lbNext').style.display = 'none';
      }
    }

    // Lightbox events
    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', function() { navigateLightbox(-1); });
    document.getElementById('lbNext').addEventListener('click', function() { navigateLightbox(1); });
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) closeLightbox();
    });

    // 键盘: Esc 关闭, 左右切换
    document.addEventListener('keydown', function(e) {
      var lb = document.getElementById('lightbox');
      if (lb.style.display === 'none') return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    });

    /* ---------- Overlay 渲染 ---------- */

    function renderPlaceholder() {
      document.getElementById('content').innerHTML =
        '<div class="placeholder">' +
          '<div class="placeholder-icon">&#9881;</div>' +
          '<div class="placeholder-text">请在主界面选择特工和地图</div>' +
          '<div class="placeholder-hint">F4 关闭</div>' +
        '</div>';
    }

    function renderOverlay(data) {
      overlayData = data;
      if (!data || !data.agent || !data.abilities || !data.map) {
        renderPlaceholder();
        return;
      }

      var mapNameHtml = esc(data.map.name);
      if (data.map.name_en) mapNameHtml += ' <span class="map-en">' + esc(data.map.name_en) + '</span>';

      var abilitiesHtml = data.abilities.map(function(ab) {
        return '<span class="ability-tag"><span class="tag-key">' + esc(ab.key) + '</span> ' + esc(ab.name_cn) + '</span>';
      }).join('');

      lineupData = data.lineups || [];
      if (currentLineupIndex >= lineupData.length) currentLineupIndex = Math.max(0, lineupData.length - 1);

      var favSectionHtml = '';
      if (lineupData.length === 0) {
        favSectionHtml =
          '<div class="fav-title"><span class="star">&#9733;</span> 收藏点位</div>' +
          '<div class="empty-state"><div class="empty-icon">&#9734;</div><div class="empty-text">暂无收藏<br>请在主界面收藏点位</div></div>';
      } else {
        var itemsHtml = lineupData.map(function(l, idx) {
          var isActive = idx === currentLineupIndex;

          var sideLabel = l.side_cn || l.side || '';
          var descHtml = l.description ? '<div class="lineup-item-desc">' + esc(l.description) + '</div>' : '';

          // 步骤（仅展开当前选中项）
          var stepsHtml = '';
          if (isActive && l.steps && l.steps.length > 0) {
            stepsHtml = '<div class="lineup-steps">';
            for (var s = 0; s < l.steps.length; s++) {
              stepsHtml += '<div class="step" data-index="' + (s + 1) + '.">' + esc(l.steps[s]) + '</div>';
            }
            stepsHtml += '</div>';
          }

          // 查看图片按钮
          var imgBtnHtml = '';
          var hasImages = !!(l.standImage || (l.detailImages && l.detailImages.length > 0));
          if (hasImages) {
            imgBtnHtml = '<button class="view-img-btn" data-idx="' + idx + '">查看图片</button>';
          }

          return '<div class="lineup-item' + (isActive ? ' active' : '') + '" data-idx="' + idx + '">' +
            '<div class="lineup-item-header">' +
              '<div class="lineup-item-title">' + esc(l.title) + '</div>' +
              '<div class="lineup-item-tags">' +
                '<span class="lineup-tag">' + esc(l.abilityKey || '?') + '</span>' +
                '<span class="lineup-tag">' + esc(sideLabel) + '</span>' +
              '</div>' +
            '</div>' +
            descHtml + imgBtnHtml + stepsHtml +
          '</div>';
        }).join('');

        var navHtml = '';
        if (lineupData.length > 1) {
          navHtml =
            '<div class="nav-arrows">' +
              '<button class="nav-arrow" id="navUp">&#9650;</button>' +
              '<span class="nav-counter">' + (currentLineupIndex + 1) + ' / ' + lineupData.length + '</span>' +
              '<button class="nav-arrow" id="navDown">&#9660;</button>' +
            '</div>';
        }

        favSectionHtml =
          '<div class="fav-title"><span class="star">&#9733;</span> 收藏点位 (' + lineupData.length + ')</div>' +
          '<div class="lineup-list">' + itemsHtml + '</div>' +
          navHtml;
      }

      document.getElementById('content').innerHTML =
        '<div class="agent-section">' +
          '<img class="agent-icon" src="' + escAttr(data.agent.iconPath) + '" alt="agent" onerror="this.style.display=\'none\'">' +
          '<div class="agent-info">' +
            '<div class="agent-name">' + esc(data.agent.name) + '</div>' +
            '<div class="map-name">' + mapNameHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="abilities-row">' + abilitiesHtml + '</div>' +
        '<div class="divider"></div>' +
        favSectionHtml +
        '<div class="divider"></div>' +
        '<div class="footer"><button class="close-btn" id="closeBtn">F4 关闭</button></div>';

      bindEvents();
      updateScrollClass();
    }

    function bindEvents() {
      var closeBtn = document.getElementById('closeBtn');
      if (closeBtn) closeBtn.addEventListener('click', function() {
        if (window.electronAPI && window.electronAPI.closeOverlay) window.electronAPI.closeOverlay();
      });

      // 点位点击
      document.querySelectorAll('.lineup-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
          // 如果点击的是查看图片按钮，不切换点位
          if (e.target.classList.contains('view-img-btn')) return;
          var idx = parseInt(this.getAttribute('data-idx'), 10);
          if (!isNaN(idx) && idx !== currentLineupIndex) {
            currentLineupIndex = idx;
            if (overlayData) renderOverlay(overlayData);
          }
        });
      });

      // 查看图片按钮
      document.querySelectorAll('.view-img-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var idx = parseInt(this.getAttribute('data-idx'), 10);
          if (!isNaN(idx) && lineupData[idx]) {
            openLightbox(lineupData[idx]);
          }
        });
      });

      // 导航
      var navUp = document.getElementById('navUp');
      var navDown = document.getElementById('navDown');
      if (navUp) navUp.addEventListener('click', function(e) { e.stopPropagation(); switchLineup(-1); });
      if (navDown) navDown.addEventListener('click', function(e) { e.stopPropagation(); switchLineup(1); });
    }

    function switchLineup(direction) {
      if (lineupData.length === 0) return;
      currentLineupIndex = (currentLineupIndex + direction + lineupData.length) % lineupData.length;
      if (overlayData) renderOverlay(overlayData);
      var activeItem = document.querySelector('.lineup-item.active');
      if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function updateScrollClass() {
      var panel = document.getElementById('panel');
      if (panel.scrollHeight > panel.clientHeight) panel.classList.add('has-scroll');
      else panel.classList.remove('has-scroll');
    }

    // 滚轮切换点位（仅在面板上）
    document.getElementById('panel').addEventListener('wheel', function(e) {
      if (lineupData.length > 1) { e.preventDefault(); switchLineup(e.deltaY > 0 ? 1 : -1); }
    }, { passive: false });

    /* ---------- 数据加载 ---------- */

    async function loadOverlayData() {
      try {
        if (window.electronAPI && window.electronAPI.getOverlayData) {
          var data = await window.electronAPI.getOverlayData();
          if (data) renderOverlay(data);
          else renderPlaceholder();
        } else {
          renderPlaceholder();
        }
      } catch (e) {
        console.error('[Overlay] 数据加载失败:', e);
        renderPlaceholder();
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(loadOverlayData, 2000);
    }

    // 初始化
    loadOverlayData().then(startPolling);
  </script>
</body>
</html>
