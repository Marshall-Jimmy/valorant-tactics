<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Tactics - Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    /* 全局鼠标穿透（面板区域通过 JS 设置 pointer-events: auto） */
    body { pointer-events: none; }

    /* 右上角水印 */
    .watermark {
      position: fixed;
      top: 16px;
      right: 20px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(167, 139, 250, 0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* 左下角速查面板 */
    .cheatsheet {
      position: fixed;
      bottom: 24px;
      left: 24px;
      width: 280px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 16px;
      padding: 20px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e4e4e7;
      pointer-events: auto;
      cursor: default;
    }

    /* 特工标题区 */
    .cs-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .cs-agent-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(167, 139, 250, 0.25);
      object-fit: cover;
      background: rgba(167, 139, 250, 0.1);
      flex-shrink: 0;
    }

    .cs-agent-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .cs-agent-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .cs-map-name {
      font-size: 13px;
      color: rgba(228, 228, 231, 0.7);
      line-height: 1.2;
    }

    .cs-map-name .map-en {
      color: rgba(228, 228, 231, 0.4);
      font-size: 12px;
      margin-left: 4px;
    }

    /* 分隔线 */
    .cs-divider {
      height: 1px;
      background: rgba(167, 139, 250, 0.15);
      margin: 10px 0;
    }

    /* 技能列表 */
    .cs-abilities {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cs-ability {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.3;
    }

    .cs-ability-key {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* 技能颜色：C=蓝 Q=绿 E=黄 X=红 */
    .cs-ability-key.key-c { background: rgba(59, 130, 246, 0.8); }
    .cs-ability-key.key-q { background: rgba(34, 197, 94, 0.8); }
    .cs-ability-key.key-e { background: rgba(234, 179, 8, 0.8); }
    .cs-ability-key.key-x { background: rgba(239, 68, 68, 0.8); }

    .cs-ability-name {
      font-size: 14px;
      font-weight: 600;
      color: #e4e4e7;
    }

    .cs-ability-desc {
      font-size: 12px;
      color: rgba(228, 228, 231, 0.5);
    }

    /* 底部关闭提示 */
    .cs-footer {
      text-align: center;
      margin-top: 12px;
    }

    .cs-close-btn {
      display: inline-block;
      padding: 4px 16px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(167, 139, 250, 0.6);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }

    .cs-close-btn:hover {
      color: rgba(167, 139, 250, 0.9);
      border-color: rgba(167, 139, 250, 0.4);
      background: rgba(167, 139, 250, 0.08);
    }

    /* 空状态 */
    .cs-placeholder {
      text-align: center;
      padding: 20px 0;
    }

    .cs-placeholder-icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    .cs-placeholder-text {
      font-size: 13px;
      color: rgba(228, 228, 231, 0.5);
      line-height: 1.5;
    }

    .cs-placeholder-hint {
      font-size: 11px;
      color: rgba(228, 228, 231, 0.3);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <!-- 右上角水印 -->
  <div class="watermark">Valorant Tactics</div>

  <!-- 左下角速查面板 -->
  <div class="cheatsheet" id="cheatsheet">
    <!-- 由 JS 动态渲染 -->
  </div>

  <script>
    /**
     * Overlay 速查卡渲染逻辑
     * - 通过 window.electronAPI.getOverlayData() 从主窗口读取数据
     * - 数据结构: { agent, abilities, map }
     * - 无 electronAPI 时显示 placeholder
     */

    const slotClassMap = {
      'C': 'key-c',
      'Q': 'key-q',
      'E': 'key-e',
      'X': 'key-x',
    };

    function renderPlaceholder() {
      var el = document.getElementById('cheatsheet');
      el.innerHTML =
        '<div class="cs-placeholder">' +
          '<div class="cs-placeholder-icon">&#9881;</div>' +
          '<div class="cs-placeholder-text">请在主界面选择特工和地图</div>' +
          '<div class="cs-placeholder-hint">F4 关闭</div>' +
        '</div>';
    }

    function renderOverlay(data) {
      if (!data || !data.agent || !data.abilities || !data.map) {
        renderPlaceholder();
        return;
      }

      var abilitiesHtml = data.abilities.map(function(ab) {
        var keyClass = slotClassMap[ab.key] || 'key-c';
        return '<div class="cs-ability">' +
          '<div class="cs-ability-key ' + keyClass + '">' + ab.key + '</div>' +
          '<div>' +
            '<div class="cs-ability-name">' + escapeHtml(ab.name_cn) + '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      var mapNameHtml = escapeHtml(data.map.name);
      if (data.map.name_en) {
        mapNameHtml += ' <span class="map-en">' + escapeHtml(data.map.name_en) + '</span>';
      }

      var el = document.getElementById('cheatsheet');
      el.innerHTML =
        '<div class="cs-header">' +
          '<img class="cs-agent-icon" src="' + escapeAttr(data.agent.iconPath) + '" alt="agent" onerror="this.style.display=\'none\'">' +
          '<div class="cs-agent-info">' +
            '<div class="cs-agent-name">' + escapeHtml(data.agent.name) + '</div>' +
            '<div class="cs-map-name">' + mapNameHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="cs-divider"></div>' +
        '<div class="cs-abilities">' +
          abilitiesHtml +
        '</div>' +
        '<div class="cs-divider"></div>' +
        '<div class="cs-footer">' +
          '<button class="cs-close-btn" id="closeBtn">F4 关闭</button>' +
        '</div>';

      document.getElementById('closeBtn').addEventListener('click', function() {
        if (window.electronAPI && window.electronAPI.closeOverlay) {
          window.electronAPI.closeOverlay();
        }
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // 加载数据
    async function loadOverlayData() {
      try {
        if (window.electronAPI && window.electronAPI.getOverlayData) {
          var data = await window.electronAPI.getOverlayData();
          if (data) {
            renderOverlay(data);
          } else {
            renderPlaceholder();
          }
        } else {
          // 非 Electron 环境（如浏览器直接打开）显示 placeholder
          renderPlaceholder();
        }
      } catch (e) {
        console.error('[Overlay] 加载数据失败:', e);
        renderPlaceholder();
      }
    }

    // 页面加载后立即获取数据
    loadOverlayData();
  </script>

</body>
</html>
