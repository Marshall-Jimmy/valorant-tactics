<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Tactics - Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      pointer-events: none;
    }

    /* 右上角水印 */
    .watermark {
      position: fixed;
      top: 16px;
      right: 20px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(167, 139, 250, 0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* 左下角战术面板 */
    .tactics-panel {
      position: fixed;
      bottom: 24px;
      left: 24px;
      width: 300px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 12px;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      color: #e4e4e7;
    }

    .panel-map-name {
      font-size: 15px;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-map-name svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .panel-divider {
      height: 1px;
      background: rgba(167, 139, 250, 0.15);
      margin: 8px 0;
    }

    .lineup-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lineup-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #d4d4d8;
      line-height: 1.3;
    }

    .lineup-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
    }

    .lineup-dot.start {
      background: #4ade80;
      box-shadow: 0 0 4px rgba(74, 222, 128, 0.5);
    }

    .lineup-dot.end {
      background: transparent;
      border: 2px solid #a78bfa;
      box-shadow: 0 0 4px rgba(167, 139, 250, 0.4);
    }

    .panel-hint {
      font-size: 11px;
      color: #71717a;
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- 右上角水印 -->
  <div class="watermark">Valorant Tactics</div>

  <!-- 左下角战术面板 -->
  <div class="tactics-panel">
    <div class="panel-map-name">
      <svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        <line x1="8" y1="2" x2="8" y2="18"/>
        <line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
      Sunset (日落之城)
    </div>
    <div class="panel-divider"></div>
    <ul class="lineup-list">
      <li class="lineup-item">
        <span class="lineup-dot start"></span>
        <span>A点进攻站位</span>
      </li>
      <li class="lineup-item">
        <span class="lineup-dot end"></span>
        <span>B点烟幕落点</span>
      </li>
      <li class="lineup-item">
        <span class="lineup-dot start"></span>
        <span>A点入门清点</span>
      </li>
      <li class="lineup-item">
        <span class="lineup-dot end"></span>
        <span>中路闪光落点</span>
      </li>
    </ul>
    <div class="panel-divider"></div>
    <div class="panel-hint">F4 关闭</div>
  </div>

</body>
</html>
