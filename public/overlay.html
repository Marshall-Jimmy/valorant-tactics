<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Tactics - Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* 窗口只覆盖面板区域，不需要穿透 */
    body { pointer-events: auto; }

    /* ============================================ */
    /*            面板 - 固定右侧                    */
    /* ============================================ */
    .overlay-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      max-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      pointer-events: auto;
      /* 半透明暗色背景 */
      background: rgba(15, 15, 25, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 4px 0 0 4px;
      border: 1px solid rgba(167, 139, 250, 0.15);
      border-right: none;
      padding: 12px;
      color: #e4e4e7;
    }

    .overlay-panel::-webkit-scrollbar { width: 4px; }
    .overlay-panel::-webkit-scrollbar-track { background: transparent; }
    .overlay-panel::-webkit-scrollbar-thumb { background: rgba(167, 139, 250, 0.25); border-radius: 2px; }

    /* 特工信息区 */
    .agent-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .agent-icon {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      border: 1px solid rgba(167, 139, 250, 0.25);
      object-fit: cover;
      background: rgba(167, 139, 250, 0.1);
      flex-shrink: 0;
    }

    .agent-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .agent-name { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .map-name { font-size: 12px; color: rgba(228, 228, 231, 0.6); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .map-name .map-en { color: rgba(228, 228, 231, 0.35); font-size: 11px; margin-left: 3px; }

    /* 技能标签 */
    .abilities-row {
      display: flex; flex-direction: column; gap: 2px;
      flex-shrink: 0; margin-bottom: 12px; padding-left: 46px;
    }

    .ability-tag {
      font-size: 12px; color: rgba(228, 228, 231, 0.5); line-height: 1.4;
    }

    .ability-tag .tag-key { color: rgba(228, 228, 231, 0.3); font-weight: 400; margin-right: 4px; }

    /* 分隔线 */
    .divider { height: 1px; background: rgba(167, 139, 250, 0.15); margin: 8px 0; flex-shrink: 0; }

    /* 收藏点位标题 */
    .fav-title {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
      color: rgba(228, 228, 231, 0.5);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 8px; flex-shrink: 0;
    }
    .fav-title .star { color: #facc15; font-size: 13px; }

    /* 点位列表 */
    .lineup-list { display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 0; }

    .lineup-item {
      padding: 8px 10px; border-radius: 4px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer; transition: all 0.15s ease;
    }

    .lineup-item:hover { background: rgba(255, 255, 255, 0.06); }
    .lineup-item.active { border-color: rgba(167, 139, 250, 0.5); background: rgba(167, 139, 250, 0.08); }

    .lineup-item-header {
      display: flex; align-items: center;
      justify-content: space-between; gap: 6px;
    }

    .lineup-item-title {
      font-size: 13px; font-weight: 600; color: #e4e4e7;
      line-height: 1.3; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .lineup-item-tags { display: flex; gap: 4px; flex-shrink: 0; }

    .lineup-tag {
      font-size: 10px; color: rgba(228, 228, 231, 0.35);
    }

    .lineup-tag.side-tag { margin-left: 4px; }

    .lineup-item-desc {
      font-size: 11px; color: rgba(228, 228, 231, 0.4);
      line-height: 1.3; margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 查看图片按钮 */
    .view-img-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; padding: 3px 8px;
      font-size: 11px; font-weight: 500;
      color: rgba(167, 139, 250, 0.7);
      background: rgba(167, 139, 250, 0.08);
      border: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 2px; cursor: pointer;
      transition: all 0.15s ease;
    }
    .view-img-btn:hover {
      color: rgba(167, 139, 250, 1);
      background: rgba(167, 139, 250, 0.15);
      border-color: rgba(167, 139, 250, 0.3);
    }

    /* 步骤列表 */
    .lineup-steps {
      margin-top: 6px; padding-top: 6px;
      border-top: 1px solid rgba(167, 139, 250, 0.1);
    }

    .step {
      font-size: 12px; color: rgba(228, 228, 231, 0.6);
      line-height: 1.5; padding-left: 14px;
      position: relative;
    }

    .step::before {
      content: attr(data-index);
      position: absolute; left: 0;
      color: rgba(167, 139, 250, 0.6);
      font-weight: 600; font-size: 11px;
    }

    /* 导航箭头 */
    .nav-arrows {
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      margin-top: 8px; flex-shrink: 0;
    }

    .nav-arrow {
      width: 28px; height: 28px; border-radius: 2px;
      border: 1px solid rgba(167, 139, 250, 0.2);
      background: rgba(167, 139, 250, 0.05);
      color: rgba(167, 139, 250, 0.6);
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease; line-height: 1;
    }

    .nav-arrow:hover {
      border-color: rgba(167, 139, 250, 0.4);
      background: rgba(167, 139, 250, 0.12);
      color: rgba(167, 139, 250, 0.9);
    }

    .nav-counter { font-size: 11px; color: rgba(228, 228, 231, 0.4); min-width: 30px; text-align: center; }

    /* 空状态 */
    .empty-state { text-align: center; padding: 16px 0; }
    .empty-icon { font-size: 24px; opacity: 0.3; margin-bottom: 6px; }
    .empty-text { font-size: 12px; color: rgba(228, 228, 231, 0.4); line-height: 1.5; }

    /* 底部关闭按钮 */
    .footer { margin-top: 10px; flex-shrink: 0; }

    .close-btn {
      display: block; width: 100%; padding: 6px 0;
      font-size: 11px; font-weight: 600;
      color: rgba(167, 139, 250, 0.5);
      border: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 4px; background: transparent;
      cursor: pointer; transition: all 0.15s ease;
      letter-spacing: 0.5px; text-align: center;
    }

    .close-btn:hover {
      color: rgba(167, 139, 250, 0.8);
      border-color: rgba(167, 139, 250, 0.35);
      background: rgba(167, 139, 250, 0.06);
    }

    /* placeholder */
    .placeholder { text-align: center; padding: 24px 16px; }
    .placeholder-icon { font-size: 28px; opacity: 0.3; margin-bottom: 8px; }
    .placeholder-text { font-size: 13px; color: rgba(228, 228, 231, 0.5); line-height: 1.5; }
    .placeholder-hint { font-size: 11px; color: rgba(228, 228, 231, 0.3); margin-top: 4px; }

    /* ============================================ */
    /*            预览 - 全屏半透明                   */
    /* ============================================ */
    .preview-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .preview-content {
      width: 50vw;
      height: 55vh;
      min-width: 400px;
      min-height: 300px;
      max-width: 800px;
      max-height: 600px;
      overflow: hidden;
      border-radius: 4px;
      position: relative;
      background: transparent;
    }

    .preview-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      transition: transform 0.2s ease;
      cursor: zoom-in;
      transform-origin: center center;
    }
    .preview-img.zoomed {
      transform: scale(1.75);
      cursor: zoom-out;
    }

    /* 预览关闭按钮 */
    .preview-close {
      position: absolute;
      top: 16px; right: 20px;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      z-index: 10;
    }

    .preview-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    /* 预览导航 */
    .preview-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.5);
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      z-index: 10;
    }

    .preview-nav:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .preview-nav.prev { left: 8px; }
    .preview-nav.next { right: 8px; }

    /* 预览计数器 */
    .preview-counter {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 12px;
      border-radius: 4px;
      z-index: 10;
    }

    /* 预览标题 */
    .preview-title {
      position: absolute;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 600;
      max-width: 60vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 10;
    }

    /* 点位坐标预览页 */
    .lineup-preview {
      width: 100%; height: 100%;
      position: relative; overflow: hidden;
      background: transparent;
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 4px;
    }

    .lineup-preview .map-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: fill;
      opacity: 0.85;
      pointer-events: none;
    }

    /* 站位标记 */
    .coord-marker {
      position: absolute;
      width: 12px; height: 12px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 1;
    }

    .coord-marker.start {
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }

    .coord-marker.end {
      background: #a78bfa;
      box-shadow: 0 0 8px rgba(167, 139, 250, 0.6);
    }

    .coord-label {
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      margin-top: 4px;
      font-size: 11px;
      white-space: nowrap;
      padding: 1px 6px;
      border-radius: 4px;
      pointer-events: none;
    }

    .coord-marker.start .coord-label {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }

    .coord-marker.end .coord-label {
      background: rgba(167, 139, 250, 0.2);
      color: #a78bfa;
    }

    /* 连线 */
    .coord-line {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* 页面指示 */
    .lightbox-page-label {
      position: absolute;
      top: 8px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.4);
      padding: 2px 10px;
      border-radius: 8px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ==================== 面板 ==================== -->
  <div id="panelRoot">
    <div class="overlay-panel" id="panel">
      <div id="content"></div>
    </div>
  </div>

  <!-- ==================== 预览 ==================== -->
  <div id="previewRoot" style="display:none;">
    <div class="preview-overlay" id="previewOverlay">
      <button class="preview-close" id="previewClose">&times;</button>
      <button class="preview-nav prev" id="previewPrev">&#9664;</button>
      <button class="preview-nav next" id="previewNext">&#9654;</button>
      <div class="preview-content" id="previewContent"></div>
      <div class="preview-title" id="previewTitle"></div>
      <div class="preview-counter" id="previewCounter"></div>
    </div>
  </div>

  <script>
    /* =============================================
     *  Overlay - 单窗口方案：面板 + 预览在同一页面内切换
     * ============================================= */

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escAttr(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\\/g, '&#92;');
    }

    /* =============================================
     *  面板逻辑
     * ============================================= */
    var currentLineupIndex = 0;
    var lineupData = [];
    var overlayData = null;
    var pollTimer = null;

    function renderPlaceholder() {
      document.getElementById('content').innerHTML =
        '<div class="placeholder">' +
          '<div class="placeholder-icon">&#9881;</div>' +
          '<div class="placeholder-text">请在主界面选择特工和地图</div>' +
          '<div class="placeholder-hint">F4 关闭</div>' +
        '</div>';
    }

    function renderOverlay(data) {
      overlayData = data;
      if (!data || !data.agent || !data.abilities || !data.map) {
        renderPlaceholder();
        return;
      }

      console.log('[Overlay] renderOverlay: agent=', data.agent.name, 'map=', data.map.name, 'lineups=', data.lineups ? data.lineups.length : 0, 'lineups content=', data.lineups);

      var mapNameHtml = esc(data.map.name);
      if (data.map.name_en) mapNameHtml += ' <span class="map-en">' + esc(data.map.name_en) + '</span>';

      var abilitiesHtml = data.abilities.map(function(ab) {
        return '<span class="ability-tag"><span class="tag-key">' + esc(ab.key) + '</span> ' + esc(ab.name_cn) + '</span>';
      }).join('');

      lineupData = data.lineups || [];
      if (currentLineupIndex >= lineupData.length) currentLineupIndex = Math.max(0, lineupData.length - 1);

      var favSectionHtml = '';
      if (lineupData.length === 0) {
        favSectionHtml =
          '<div class="fav-title"><span class="star">&#9733;</span> 收藏点位</div>' +
          '<div class="empty-state"><div class="empty-icon">&#9734;</div><div class="empty-text">暂无收藏<br>请在主界面收藏点位</div></div>';
      } else {
        var itemsHtml = lineupData.map(function(l, idx) {
          var isActive = idx === currentLineupIndex;

          var sideLabel = l.side_cn || l.side || '';
          var descHtml = l.description ? '<div class="lineup-item-desc">' + esc(l.description) + '</div>' : '';

          // 步骤（仅展开当前选中项）
          var stepsHtml = '';
          if (isActive && l.steps && l.steps.length > 0) {
            stepsHtml = '<div class="lineup-steps">';
            for (var s = 0; s < l.steps.length; s++) {
              stepsHtml += '<div class="step" data-index="' + (s + 1) + '.">' + esc(l.steps[s]) + '</div>';
            }
            stepsHtml += '</div>';
          }

          // 查看图片按钮 - 点击后在同页面内打开预览
          var imgBtnHtml = '';
          var hasMedia = !!(l.standImage || (l.detailImages && l.detailImages.length > 0) || l.coordinates);
          if (hasMedia) {
            imgBtnHtml = '<button class="view-img-btn" data-idx="' + idx + '">查看图片</button>';
          }

          return '<div class="lineup-item' + (isActive ? ' active' : '') + '" data-idx="' + idx + '">' +
            '<div class="lineup-item-header">' +
              '<div class="lineup-item-title">' + esc(l.title) + '</div>' +
              '<div class="lineup-item-tags">' +
                '<span class="lineup-tag">' + esc(l.abilityKey || '?') + '</span>' +
                '<span class="lineup-tag">' + esc(sideLabel) + '</span>' +
              '</div>' +
            '</div>' +
            descHtml + imgBtnHtml + stepsHtml +
          '</div>';
        }).join('');

        var navHtml = '';
        if (lineupData.length > 1) {
          navHtml =
            '<div class="nav-arrows">' +
              '<button class="nav-arrow" id="navUp">&#9650;</button>' +
              '<span class="nav-counter">' + (currentLineupIndex + 1) + ' / ' + lineupData.length + '</span>' +
              '<button class="nav-arrow" id="navDown">&#9660;</button>' +
            '</div>';
        }

        favSectionHtml =
          '<div class="fav-title"><span class="star">&#9733;</span> 收藏点位 (' + lineupData.length + ')</div>' +
          '<div class="lineup-list">' + itemsHtml + '</div>' +
          navHtml;
      }

      document.getElementById('content').innerHTML =
        '<div class="agent-section">' +
          '<img class="agent-icon" src="' + escAttr(data.agent.iconPath) + '" alt="agent" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22 rx=%2215%22/><text fill=%22%23a78bfa%22 x=%2250%22 y=%2265%22 text-anchor=%22middle%22 font-size=%2240%22>?</text></svg>\'">' +
          '<div class="agent-info">' +
            '<div class="agent-name">' + esc(data.agent.name) + '</div>' +
            '<div class="map-name">' + mapNameHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="abilities-row">' + abilitiesHtml + '</div>' +
        '<div class="divider"></div>' +
        favSectionHtml +
        '<div class="divider"></div>' +
        '<div class="footer"><button class="close-btn" id="closeBtn">F4 关闭</button></div>';

      bindPanelEvents();
      preloadImages();

      // 根据面板位置调整圆角和边框
      var panelEl = document.querySelector('.overlay-panel');
      if (panelEl) {
        if (data.panelPosition === 'left') {
          panelEl.style.borderRadius = '0 4px 4px 0';
          panelEl.style.borderRight = '1px solid rgba(167, 139, 250, 0.15)';
          panelEl.style.borderLeft = 'none';
        } else {
          panelEl.style.borderRadius = '4px 0 0 4px';
          panelEl.style.borderRight = 'none';
          panelEl.style.borderLeft = '1px solid rgba(167, 139, 250, 0.15)';
        }
      }

      // 检测面板位置变化，通知主进程
      if (data.panelPosition && data.panelPosition !== currentPanelPosition) {
        currentPanelPosition = data.panelPosition;
        if (window.electronAPI && window.electronAPI.setPanelPosition) {
          window.electronAPI.setPanelPosition(data.panelPosition);
        }
      }
    }

    function bindPanelEvents() {
      var closeBtn = document.getElementById('closeBtn');
      if (closeBtn) closeBtn.addEventListener('click', function() {
        if (window.electronAPI && window.electronAPI.closeOverlay) window.electronAPI.closeOverlay();
      });

      // 点位点击
      document.querySelectorAll('.lineup-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
          // 如果点击的是查看图片按钮，不切换点位
          if (e.target.classList.contains('view-img-btn')) return;
          var idx = parseInt(this.getAttribute('data-idx'), 10);
          if (!isNaN(idx) && idx !== currentLineupIndex) {
            currentLineupIndex = idx;
            if (overlayData) renderOverlay(overlayData);
          }
        });
      });

      // 查看图片按钮 - 在同页面内打开预览
      document.querySelectorAll('.view-img-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var idx = parseInt(this.getAttribute('data-idx'), 10);
          console.log('[Overlay] 查看图片按钮点击, idx=', idx, 'lineupData[idx]=', !!lineupData[idx], 'lineupData.length=', lineupData.length);
          if (!isNaN(idx) && lineupData[idx]) {
            console.log('[Overlay] 调用 showPreview, lineup=', lineupData[idx].title);
            showPreview(lineupData[idx]);
          } else {
            console.warn('[Overlay] 无法打开预览: idx=', idx, 'isNaN=', isNaN(idx), 'hasLineup=', !!lineupData[idx]);
          }
        });
      });

      // 导航
      var navUp = document.getElementById('navUp');
      var navDown = document.getElementById('navDown');
      if (navUp) navUp.addEventListener('click', function(e) { e.stopPropagation(); switchLineup(-1); });
      if (navDown) navDown.addEventListener('click', function(e) { e.stopPropagation(); switchLineup(1); });
    }

    function switchLineup(direction) {
      if (lineupData.length === 0) return;
      currentLineupIndex = (currentLineupIndex + direction + lineupData.length) % lineupData.length;
      if (overlayData) renderOverlay(overlayData);
      var activeItem = document.querySelector('.lineup-item.active');
      if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      preloadImages();
    }

    // 预加载当前点位的图片
    function preloadImages() {
      if (!lineupData || !lineupData[currentLineupIndex]) return;
      var item = lineupData[currentLineupIndex];
      var urls = [];
      if (item.standImage) urls.push(item.standImage);
      if (item.detailImages) urls = urls.concat(item.detailImages);
      urls.forEach(function(url) {
        if (url && !url.startsWith('data:')) {
          var img = new Image();
          img.src = url;
        }
      });
    }

    // 滚轮切换点位（仅在面板可见时）
    document.getElementById('panel').addEventListener('wheel', function(e) {
      if (document.getElementById('panelRoot').style.display === 'none') return;
      if (lineupData.length > 1) { e.preventDefault(); switchLineup(e.deltaY > 0 ? 1 : -1); }
    }, { passive: false });

    /* ---------- 坐标转换（与主应用 normalizedToWorld 一致） ---------- */
    // 仿射变换系数，来自 src/data/lineups.ts
    var NORMALIZED_HEIGHT = 1000;
    var WORLD_ASPECT_RATIO = 16 / 9;
    var WORLD_WIDTH = NORMALIZED_HEIGHT * WORLD_ASPECT_RATIO; // 1777.78
    var MAP_DISPLAY_WIDTH = 1240;
    var MAP_DISPLAY_HEIGHT = 1000;
    var MAP_PADDING_X = (WORLD_WIDTH - MAP_DISPLAY_WIDTH) / 2; // ~268.89

    function normalizedToWorld(nx, ny) {
      var x = -24.8055 * nx + 917.7683 * ny + 441.5591;
      var y = -940.7984 * nx + -6.6050 * ny + 969.9544;
      return { x: x, y: y };
    }

    // normalized [0,1] → 地图图片百分比 [0,100]
    function normalizedToMapPercent(nx, ny) {
      var w = normalizedToWorld(nx, ny);
      var px = ((w.x - MAP_PADDING_X) / MAP_DISPLAY_WIDTH) * 100;
      var py = (w.y / MAP_DISPLAY_HEIGHT) * 100;
      return { x: px, y: py };
    }

    /* ---------- 数据加载 ---------- */
    var lastOverlayDataJson = '';
    var currentPanelPosition = 'right';

    async function loadOverlayData() {
      try {
        if (window.electronAPI && window.electronAPI.getOverlayData) {
          var data = await window.electronAPI.getOverlayData();
          // 序列化比较，数据未变化时跳过重渲染
          var json = data ? JSON.stringify(data) : '';
          if (json === lastOverlayDataJson) return;
          lastOverlayDataJson = json;
          if (data) renderOverlay(data);
          else renderPlaceholder();
        } else {
          renderPlaceholder();
        }
      } catch (e) {
        console.error('[Overlay] 数据加载失败:', e);
        renderPlaceholder();
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      var pollCount = 0;
      pollTimer = setInterval(function() {
        loadOverlayData();
        pollCount++;
        // 5 次成功加载后降频到 5 秒
        if (pollCount === 5) {
          clearInterval(pollTimer);
          pollTimer = setInterval(loadOverlayData, 5000);
        }
      }, 2000);
    }

    /* =============================================
     *  预览逻辑（同页面内切换，不再创建新窗口）
     * ============================================= */
    var lbPages = [];
    var lbIndex = 0;
    var lbTitle = '';

    function showPreview(lineup) {
      console.log('[Overlay] showPreview 被调用, lineup=', lineup ? lineup.title : 'null');
      try {
        // 注入 mapKey
        var lineupCopy = Object.assign({}, lineup);
        if (overlayData && overlayData.map && overlayData.map.key) {
          lineupCopy.mapKey = overlayData.map.key;
        }
        console.log('[Overlay] showPreview, coordinates=', JSON.stringify(lineupCopy.coordinates));

        // 扩展窗口到全屏
        if (window.electronAPI && window.electronAPI.expandWindow) {
          window.electronAPI.expandWindow();
        }

        // 隐藏面板
        document.getElementById('panelRoot').style.display = 'none';

        // 显示预览
        var previewRoot = document.getElementById('previewRoot');
        previewRoot.style.display = '';

        // 构建预览页
        lbTitle = lineupCopy.title || '';
        lbPages = [];
        lbIndex = 0;

        // 第0页：坐标预览
        if (lineupCopy.coordinates) {
          lbPages.push({ type: 'coords', data: lineupCopy });
        }

        // 图片页
        var images = [];
        if (lineupCopy.standImage) images.push(lineupCopy.standImage);
        if (lineupCopy.detailImages) images = images.concat(lineupCopy.detailImages);
        images.forEach(function(url) {
          if (url) lbPages.push({ type: 'image', src: url });
        });

        if (lbPages.length > 0) {
          renderPreviewPage();
        } else {
          document.getElementById('previewContent').innerHTML = '<div style="color:rgba(255,255,255,0.5);text-align:center;">无预览内容</div>';
          document.getElementById('previewTitle').textContent = lbTitle;
          document.getElementById('previewCounter').style.display = 'none';
          document.getElementById('previewPrev').style.display = 'none';
          document.getElementById('previewNext').style.display = 'none';
        }
      } catch(e) {
        console.error('[Overlay] showPreview 错误:', e);
      }
    }

    function renderPreviewPage() {
      var page = lbPages[lbIndex];
      var content = document.getElementById('previewContent');

      if (!page) {
        content.innerHTML = '<div style="color:rgba(255,255,255,0.5);text-align:center;">无预览内容</div>';
        return;
      }

      if (page.type === 'coords') {
        var coords = page.data.coordinates;
        // 防御性检查
        if (!coords || !Array.isArray(coords.start) || coords.start.length < 2 ||
            !Array.isArray(coords.end) || coords.end.length < 2) {
          content.innerHTML = '<div style="color:rgba(255,255,255,0.5);text-align:center;">坐标数据缺失</div>';
          document.getElementById('previewTitle').textContent = lbTitle;
          return;
        }
        // 使用与主应用一致的仿射变换将 normalized 转为地图图片百分比
        var startPercent = normalizedToMapPercent(coords.start[0], coords.start[1]);
        var endPercent = normalizedToMapPercent(coords.end[0], coords.end[1]);
        var x1 = Math.max(0, Math.min(100, startPercent.x));
        var y1 = Math.max(0, Math.min(100, startPercent.y));
        var x2 = Math.max(0, Math.min(100, endPercent.x));
        var y2 = Math.max(0, Math.min(100, endPercent.y));
        var mapKey = page.data.mapKey || '';
        var mapSvg = mapKey ? '/maps/' + mapKey + '_map.svg' : '';

        var mapBgHtml = mapSvg
          ? '<img class="map-bg" src="' + escAttr(mapSvg) + '" alt="" onerror="this.style.display=\'none\'">'
          : '';

        content.innerHTML =
          '<div class="lineup-preview">' +
            mapBgHtml +
            '<svg class="coord-line" viewBox="0 0 100 100" preserveAspectRatio="none">' +
              '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="rgba(167,139,250,0.4)" stroke-width="0.4" stroke-dasharray="1,1"/>' +
            '</svg>' +
            '<div class="coord-marker start" style="left:' + x1 + '%;top:' + y1 + '%"><div class="coord-label">站位</div></div>' +
            '<div class="coord-marker end" style="left:' + x2 + '%;top:' + y2 + '%"><div class="coord-label">落点</div></div>' +
            '<div class="lightbox-page-label">坐标预览</div>' +
          '</div>';
      } else if (page.type === 'image') {
        content.innerHTML = '<img class="preview-img" src="' + escAttr(page.src) + '" alt="' + escAttr(lbTitle) + '" onclick="event.stopPropagation(); this.classList.toggle(\'zoomed\')">';
      }

      // 更新标题和计数器
      document.getElementById('previewTitle').textContent = lbTitle;
      var total = lbPages.length;
      if (total > 1) {
        document.getElementById('previewCounter').textContent = (lbIndex + 1) + ' / ' + total;
        document.getElementById('previewCounter').style.display = '';
        document.getElementById('previewPrev').style.display = '';
        document.getElementById('previewNext').style.display = '';
      } else {
        document.getElementById('previewCounter').style.display = 'none';
        document.getElementById('previewPrev').style.display = 'none';
        document.getElementById('previewNext').style.display = 'none';
      }
    }

    function navigatePreview(dir) {
      lbIndex = (lbIndex + dir + lbPages.length) % lbPages.length;
      renderPreviewPage();
    }

    function hidePreview() {
      document.getElementById('previewRoot').style.display = 'none';
      // 恢复面板
      document.getElementById('panelRoot').style.display = '';

      lbPages = [];
      lbIndex = 0;
      lbTitle = '';
      // 缩小窗口回面板大小
      if (window.electronAPI && window.electronAPI.shrinkWindow) {
        window.electronAPI.shrinkWindow();
      }
    }

    /* =============================================
     *  预览事件绑定
     * ============================================= */
    document.getElementById('previewClose').addEventListener('click', function(e) { e.stopPropagation(); hidePreview(); });
    document.getElementById('previewPrev').addEventListener('click', function(e) { e.stopPropagation(); navigatePreview(-1); });
    document.getElementById('previewNext').addEventListener('click', function(e) { e.stopPropagation(); navigatePreview(1); });
    document.getElementById('previewOverlay').addEventListener('click', function(e) {
      // 点击预览内容外部或遮罩层关闭预览（导航按钮已 stopPropagation）
      var content = document.getElementById('previewContent');
      if (e.target === this || !content.contains(e.target)) hidePreview();
    });

    // Esc 关闭预览恢复面板
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (document.getElementById('previewRoot').style.display !== 'none') {
          hidePreview();
        }
      }
      if (document.getElementById('previewRoot').style.display !== 'none') {
        if (e.key === 'ArrowLeft') navigatePreview(-1);
        if (e.key === 'ArrowRight') navigatePreview(1);
      }
    });

    /* =============================================
     *  初始化
     * ============================================= */
    // 注册即时数据推送监听
    if (window.electronAPI && window.electronAPI.onOverlayDataUpdate) {
      window.electronAPI.onOverlayDataUpdate(function(data) {
        if (data) {
          var json = JSON.stringify(data);
          if (json !== lastOverlayDataJson) {
            lastOverlayDataJson = json;
            renderOverlay(data);
          }
        } else {
          if (lastOverlayDataJson !== '') {
            lastOverlayDataJson = '';
            renderPlaceholder();
          }
        }
      });
    }

    loadOverlayData().then(startPolling);
  </script>
</body>
</html>
