<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Tactics - Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    /* 全局鼠标穿透（面板区域通过 JS 设置 pointer-events: auto） */
    body { pointer-events: none; }

    /* 右侧贴边速查面板 */
    .overlay-panel {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 260px;
      max-height: 80vh;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(167, 139, 250, 0.2);
      border-top: 1px solid rgba(167, 139, 250, 0.15);
      border-bottom: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 16px 0 0 16px;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e4e4e7;
      pointer-events: auto;
      cursor: default;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .overlay-panel.has-scroll {
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* 自定义滚动条 */
    .overlay-panel::-webkit-scrollbar {
      width: 4px;
    }
    .overlay-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    .overlay-panel::-webkit-scrollbar-thumb {
      background: rgba(167, 139, 250, 0.25);
      border-radius: 2px;
    }

    /* 特工信息区 */
    .agent-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .agent-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(167, 139, 250, 0.25);
      object-fit: cover;
      background: rgba(167, 139, 250, 0.1);
      flex-shrink: 0;
    }

    .agent-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .agent-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-name {
      font-size: 12px;
      color: rgba(228, 228, 231, 0.6);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-name .map-en {
      color: rgba(228, 228, 231, 0.35);
      font-size: 11px;
      margin-left: 3px;
    }

    /* 技能标签区 */
    .abilities-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
      margin-bottom: 12px;
    }

    .ability-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }

    .ability-tag .tag-key {
      font-size: 11px;
      opacity: 0.7;
    }

    .ability-tag.key-c { background: rgba(16, 185, 129, 0.25); color: #6ee7b7; }
    .ability-tag.key-q { background: rgba(59, 130, 246, 0.25); color: #93c5fd; }
    .ability-tag.key-e { background: rgba(168, 85, 247, 0.25); color: #c4b5fd; }
    .ability-tag.key-x { background: rgba(245, 158, 11, 0.25); color: #fcd34d; }

    /* 分隔线 */
    .divider {
      height: 1px;
      background: rgba(167, 139, 250, 0.15);
      margin: 8px 0;
      flex-shrink: 0;
    }

    /* 收藏点位标题 */
    .fav-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(228, 228, 231, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .fav-title .star {
      color: #facc15;
      font-size: 13px;
    }

    /* 收藏点位列表 */
    .lineup-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-height: 0;
    }

    .lineup-item {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .lineup-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .lineup-item.active {
      border-color: rgba(167, 139, 250, 0.5);
      background: rgba(167, 139, 250, 0.08);
    }

    .lineup-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .lineup-item-title {
      font-size: 13px;
      font-weight: 600;
      color: #e4e4e7;
      line-height: 1.3;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lineup-item-tags {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .lineup-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 4px;
      line-height: 1.4;
    }

    .lineup-tag.side-attack {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .lineup-tag.side-defense {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    .lineup-tag.side-unknown {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(228, 228, 231, 0.5);
    }

    .lineup-tag.ability-tag-sm {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
    }

    .lineup-tag.ability-tag-sm.key-c { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
    .lineup-tag.ability-tag-sm.key-q { background: rgba(59, 130, 246, 0.2); color: #93c5fd; }
    .lineup-tag.ability-tag-sm.key-e { background: rgba(168, 85, 247, 0.2); color: #c4b5fd; }
    .lineup-tag.ability-tag-sm.key-x { background: rgba(245, 158, 11, 0.2); color: #fcd34d; }

    /* 点位描述 */
    .lineup-item-desc {
      font-size: 11px;
      color: rgba(228, 228, 231, 0.4);
      line-height: 1.3;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 步骤列表（展开） */
    .lineup-steps {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(167, 139, 250, 0.1);
    }

    .step {
      font-size: 12px;
      color: rgba(228, 228, 231, 0.6);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }

    .step::before {
      content: attr(data-index);
      position: absolute;
      left: 0;
      color: rgba(167, 139, 250, 0.6);
      font-weight: 600;
      font-size: 11px;
    }

    /* 上/下导航箭头 */
    .nav-arrows {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      flex-shrink: 0;
    }

    .nav-arrow {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(167, 139, 250, 0.2);
      background: rgba(167, 139, 250, 0.05);
      color: rgba(167, 139, 250, 0.6);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      line-height: 1;
    }

    .nav-arrow:hover {
      border-color: rgba(167, 139, 250, 0.4);
      background: rgba(167, 139, 250, 0.12);
      color: rgba(167, 139, 250, 0.9);
    }

    .nav-counter {
      font-size: 11px;
      color: rgba(228, 228, 231, 0.4);
      min-width: 30px;
      text-align: center;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 16px 0;
    }

    .empty-icon {
      font-size: 24px;
      opacity: 0.3;
      margin-bottom: 6px;
    }

    .empty-text {
      font-size: 12px;
      color: rgba(228, 228, 231, 0.4);
      line-height: 1.5;
    }

    /* 底部关闭按钮 */
    .footer {
      margin-top: 10px;
      flex-shrink: 0;
    }

    .close-btn {
      display: block;
      width: 100%;
      padding: 6px 0;
      font-size: 11px;
      font-weight: 600;
      color: rgba(167, 139, 250, 0.5);
      border: 1px solid rgba(167, 139, 250, 0.15);
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .close-btn:hover {
      color: rgba(167, 139, 250, 0.8);
      border-color: rgba(167, 139, 250, 0.35);
      background: rgba(167, 139, 250, 0.06);
    }

    /* placeholder 状态 */
    .placeholder {
      text-align: center;
      padding: 24px 16px;
    }

    .placeholder-icon {
      font-size: 28px;
      opacity: 0.3;
      margin-bottom: 8px;
    }

    .placeholder-text {
      font-size: 13px;
      color: rgba(228, 228, 231, 0.5);
      line-height: 1.5;
    }

    .placeholder-hint {
      font-size: 11px;
      color: rgba(228, 228, 231, 0.3);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="overlay-panel" id="panel">
    <div id="content"></div>
  </div>

  <script>
    /**
     * Overlay 右侧贴边速查卡
     * - 通过 window.electronAPI.getOverlayData() 从主窗口读取数据
     * - 数据结构: { agent, abilities, map, lineups[], favoriteIds[] }
     * - 支持收藏点位切换、滚轮切换、步骤展开
     */

    const slotClassMap = {
      'C': 'key-c',
      'Q': 'key-q',
      'E': 'key-e',
      'X': 'key-x',
    };

    const sideClassMap = {
      'attack': 'side-attack',
      'defense': 'side-defense',
    };

    let currentLineupIndex = 0;
    let lineupData = [];
    let overlayData = null;
    let pollTimer = null;

    // 安全的 HTML 转义
    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escAttr(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function renderPlaceholder() {
      document.getElementById('content').innerHTML =
        '<div class="placeholder">' +
          '<div class="placeholder-icon">&#9881;</div>' +
          '<div class="placeholder-text">请在主界面选择特工和地图</div>' +
          '<div class="placeholder-hint">F4 关闭</div>' +
        '</div>';
    }

    function renderOverlay(data) {
      overlayData = data;
      if (!data || !data.agent || !data.abilities || !data.map) {
        renderPlaceholder();
        return;
      }

      // 构建特工信息区
      var mapNameHtml = esc(data.map.name);
      if (data.map.name_en) {
        mapNameHtml += ' <span class="map-en">' + esc(data.map.name_en) + '</span>';
      }

      // 技能标签
      var abilitiesHtml = data.abilities.map(function(ab) {
        var keyClass = slotClassMap[ab.key] || 'key-c';
        return '<span class="ability-tag ' + keyClass + '">' +
          '<span class="tag-key">' + esc(ab.key) + '</span> ' +
          esc(ab.name_cn) +
        '</span>';
      }).join('');

      // 收藏点位
      lineupData = data.lineups || [];
      if (currentLineupIndex >= lineupData.length) {
        currentLineupIndex = Math.max(0, lineupData.length - 1);
      }

      var favSectionHtml = '';
      if (lineupData.length === 0) {
        favSectionHtml =
          '<div class="fav-title"><span class="star">&#9733;</span> 收藏点位</div>' +
          '<div class="empty-state">' +
            '<div class="empty-icon">&#9734;</div>' +
            '<div class="empty-text">暂无收藏<br>请在主界面收藏点位</div>' +
          '</div>';
      } else {
        var itemsHtml = lineupData.map(function(l, idx) {
          var isActive = idx === currentLineupIndex;
          var sideClass = sideClassMap[l.side] || 'side-unknown';
          var abilityClass = slotClassMap[l.abilityKey] || 'key-c';
          var sideLabel = l.side_cn || l.side || '';
          var descHtml = l.description ? '<div class="lineup-item-desc">' + esc(l.description) + '</div>' : '';

          // 步骤（仅展开当前选中项）
          var stepsHtml = '';
          if (isActive && l.steps && l.steps.length > 0) {
            stepsHtml = '<div class="lineup-steps">';
            for (var s = 0; s < l.steps.length; s++) {
              stepsHtml += '<div class="step" data-index="' + (s + 1) + '.">' + esc(l.steps[s]) + '</div>';
            }
            stepsHtml += '</div>';
          }

          return '<div class="lineup-item' + (isActive ? ' active' : '') + '" data-idx="' + idx + '">' +
            '<div class="lineup-item-header">' +
              '<div class="lineup-item-title">' + esc(l.title) + '</div>' +
              '<div class="lineup-item-tags">' +
                '<span class="lineup-tag ability-tag-sm ' + abilityClass + '">' + esc(l.abilityKey || '?') + '</span>' +
                '<span class="lineup-tag ' + sideClass + '">' + esc(sideLabel) + '</span>' +
              '</div>' +
            '</div>' +
            descHtml +
            stepsHtml +
          '</div>';
        }).join('');

        // 导航箭头（多于 1 个点位时显示）
        var navHtml = '';
        if (lineupData.length > 1) {
          navHtml =
            '<div class="nav-arrows">' +
              '<button class="nav-arrow" id="navUp">&#9650;</button>' +
              '<span class="nav-counter">' + (currentLineupIndex + 1) + ' / ' + lineupData.length + '</span>' +
              '<button class="nav-arrow" id="navDown">&#9660;</button>' +
            '</div>';
        }

        favSectionHtml =
          '<div class="fav-title"><span class="star">&#9733;</span> 收藏点位 (' + lineupData.length + ')</div>' +
          '<div class="lineup-list">' + itemsHtml + '</div>' +
          navHtml;
      }

      var panel = document.getElementById('content');
      panel.innerHTML =
        '<div class="agent-section">' +
          '<img class="agent-icon" src="' + escAttr(data.agent.iconPath) + '" alt="agent" onerror="this.style.display=\'none\'">' +
          '<div class="agent-info">' +
            '<div class="agent-name">' + esc(data.agent.name) + '</div>' +
            '<div class="map-name">' + mapNameHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="abilities-row">' + abilitiesHtml + '</div>' +
        '<div class="divider"></div>' +
        favSectionHtml +
        '<div class="divider"></div>' +
        '<div class="footer">' +
          '<button class="close-btn" id="closeBtn">F4 关闭</button>' +
        '</div>';

      // 绑定事件
      bindEvents();
      updateScrollClass();
    }

    function bindEvents() {
      // 关闭按钮
      var closeBtn = document.getElementById('closeBtn');
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          if (window.electronAPI && window.electronAPI.closeOverlay) {
            window.electronAPI.closeOverlay();
          }
        });
      }

      // 点位点击
      var items = document.querySelectorAll('.lineup-item');
      items.forEach(function(item) {
        item.addEventListener('click', function() {
          var idx = parseInt(this.getAttribute('data-idx'), 10);
          if (!isNaN(idx) && idx !== currentLineupIndex) {
            currentLineupIndex = idx;
            if (overlayData) renderOverlay(overlayData);
          }
        });
      });

      // 上/下导航
      var navUp = document.getElementById('navUp');
      var navDown = document.getElementById('navDown');
      if (navUp) {
        navUp.addEventListener('click', function(e) {
          e.stopPropagation();
          switchLineup(-1);
        });
      }
      if (navDown) {
        navDown.addEventListener('click', function(e) {
          e.stopPropagation();
          switchLineup(1);
        });
      }
    }

    function switchLineup(direction) {
      if (lineupData.length === 0) return;
      currentLineupIndex = (currentLineupIndex + direction + lineupData.length) % lineupData.length;
      if (overlayData) renderOverlay(overlayData);
      // 滚动选中项到可见区域
      var activeItem = document.querySelector('.lineup-item.active');
      if (activeItem) {
        activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    function updateScrollClass() {
      var panel = document.getElementById('panel');
      if (panel.scrollHeight > panel.clientHeight) {
        panel.classList.add('has-scroll');
      } else {
        panel.classList.remove('has-scroll');
      }
    }

    // 滚轮切换点位
    document.getElementById('panel').addEventListener('wheel', function(e) {
      if (lineupData.length > 1) {
        e.preventDefault();
        switchLineup(e.deltaY > 0 ? 1 : -1);
      }
    }, { passive: false });

    // 加载数据
    async function loadOverlayData() {
      try {
        if (window.electronAPI && window.electronAPI.getOverlayData) {
          var data = await window.electronAPI.getOverlayData();
          if (data) {
            renderOverlay(data);
          } else {
            renderPlaceholder();
          }
        } else {
          // 非 Electron 环境
          renderPlaceholder();
        }
      } catch (e) {
        console.error('[Overlay] 加载数据失败:', e);
        renderPlaceholder();
      }
    }

    // 定期轮询数据更新（每 2 秒）
    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(function() {
        loadOverlayData();
      }, 2000);
    }

    // 初始化
    loadOverlayData().then(function() {
      startPolling();
    });
  </script>

</body>
</html>
